name: Generate ASCII artwork

on: push

jobs:
    build_job_1:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: List repo Files
          run: ls -ltra

        - name: Executing shell script
          run: ./ascii-script.sh

        - name: Sleep for 30 seconds
          run: sleep 30

    test_job_2:
        needs: build_job_1
        runs-on: ubuntu-latest
        steps:
          - name: sleep for 10 seconds
            run: sleep 10

          - name: Test File Exists
            run: grep -i "dragon" dragon.txt

    deploy_job_3:
        needs: [test_job_2]
        runs-on: ubuntu-latest
        steps:
          - name: Read File
            run: cat dragon.txt

          - name: Deploy
            run: echo Deploying ... ... .
        
