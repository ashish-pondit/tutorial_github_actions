name: Generate ASCII artwork

on: push

jobs:
    build_job_1:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: List repo Files
          run: ls -ltra

        - name: Executing shell script
          run: ./ascii-script.sh

        - name: Sleep for 5 seconds
          run: sleep 5

        - name: Upload artiface
          uses: actions/upload-artifact@v6
          with:
            name: dragon-text-file-44
            path: ./dragon.txt

    test_job_2:
        needs: build_job_1
        runs-on: ubuntu-latest
        steps:
          - name: Download dragon scroll
            uses: actions/download-artifact@v8
            with:
              name: dragon-text-file-44
              path: ./dragon.txt

          - name: sleep for 5 seconds
            run: sleep 5

          - name: Test File Exists
            run: grep -i "dragon" dragon.txt

    deploy_job_3:
        needs: [test_job_2]
        runs-on: ubuntu-latest
        steps:
          - name: Download dragon scroll
            uses: actions/download-artifact@v8
            with:
              name: dragon-text-file-44
              path: ./dragon.txt

          - name: Read File
            run: cat dragon.txt

          - name: Deploy
            run: echo Deploying ... ... .
        
