name: Matrix Configuration

on:
    push:
    workflow_dispatch:

jobs:
    deploy:
        strategy:
            matrix:
                version: [10, 12, 14]
                os: [ubuntu-latest, windows-latest, ubuntu-22.04]
                images: [hello-world, alpine]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Echo docker details on ${{ matrix.os }}
              run: docker info

            - name: Run docker images on ${{ matrix.images }}
              run: docker run ${{ matrix.images }}